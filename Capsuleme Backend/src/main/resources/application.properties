# =============================================
# CapsuleMe - Application Configuration
# =============================================
server.port=8080

# =============================================
# MySQL Database — change password to yours
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/capsuleme_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=2078955@iP
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate — auto creates tables on first run
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =============================================
# Gmail SMTP — use App Password, not real password
# How to get App Password:
#   Google Account > Security > 2-Step Verification > App Passwords
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App base URL (used in email links)
app.base-url=http://localhost:8080
